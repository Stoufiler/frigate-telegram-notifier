services:
  frigate-telegram-bot:
    image: ghcr.io/stoufiler/frigate-telegram-notifier:latest
    container_name: frigate-telegram-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # MQTT broker: host (IP or hostname) + optional port (default 1883)
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TOPIC=${MQTT_TOPIC:-frigate/reviews}
      # Frigate: host (IP or hostname) + optional port (default 5000, internal no-auth port)
      - FRIGATE_HOST=${FRIGATE_HOST}
      - FRIGATE_PORT=${FRIGATE_PORT:-5000}
      # Set FRIGATE_TLS=true and FRIGATE_USERNAME/PASSWORD to use the authenticated port (8971)
      - FRIGATE_TLS=${FRIGATE_TLS:-false}
      - FRIGATE_USERNAME=${FRIGATE_USERNAME}
      - FRIGATE_PASSWORD=${FRIGATE_PASSWORD}
      - CAMERA_LIST=${CAMERA_LIST}
      - MQTT_OBJECT_FILTER=${MQTT_OBJECT_FILTER}
      - BOT_LANGUAGE=${BOT_LANGUAGE:-fr}
