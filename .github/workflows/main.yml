name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*' # Triggers on tags like v1.0.0, v0.1.2, etc.
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: frigate-telegram-bot

jobs:
  build-go-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./bot/go.mod

      - name: Build Linux Binary
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o frigate_bot_linux .
        working-directory: ./bot

      - name: Build macOS Binary (Intel)
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o frigate_bot_macos_amd64 .
        working-directory: ./bot

      - name: Build macOS Binary (ARM)
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o frigate_bot_macos_arm64 .
        working-directory: ./bot

      - name: Build Windows Binary
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o frigate_bot_windows.exe .
        working-directory: ./bot

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: frigate_bot_linux
          path: ./bot/frigate_bot_linux

      - name: Upload macOS Binary (Intel)
        uses: actions/upload-artifact@v4
        with:
          name: frigate_bot_macos_amd64
          path: ./bot/frigate_bot_macos_amd64

      - name: Upload macOS Binary (ARM)
        uses: actions/upload-artifact@v4
        with:
          name: frigate_bot_macos_arm64
          path: ./bot/frigate_bot_macos_arm64

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: frigate_bot_windows.exe
          path: ./bot/frigate_bot_windows.exe

  build-and-push-docker-image:
    runs-on: ubuntu-latest
    needs: build-go-binaries # Ensure binaries are built first
    permissions:
      packages: write # Grant write permission to packages for GHCR
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Set lowercase repository name as env var
        run: echo "GHCR_REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bot/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPO_LOWER }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}:{1}', env.GHCR_REPO_LOWER, steps.extract_tag.outputs.TAG_NAME) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    runs-on: ubuntu-latest
    needs: build-go-binaries # Depends on binaries being built
    if: startsWith(github.ref, 'refs/tags/v') # Only run on tags
    permissions:
      contents: write # To create a GitHub Release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: extract_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: frigate_bot_linux
          path: ./binaries

      - name: Download macOS Binary (Intel)
        uses: actions/download-artifact@v4
        with:
          name: frigate_bot_macos_amd64
          path: ./binaries

      - name: Download macOS Binary (ARM)
        uses: actions/download-artifact@v4
        with:
          name: frigate_bot_macos_arm64
          path: ./binaries

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: frigate_bot_windows.exe
          path: ./binaries

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract_tag.outputs.TAG_NAME }}
          name: Release ${{ steps.extract_tag.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            ./binaries/frigate_bot_linux
            ./binaries/frigate_bot_macos_amd64
            ./binaries/frigate_bot_macos_arm64
            ./binaries/frigate_bot_windows.exe
